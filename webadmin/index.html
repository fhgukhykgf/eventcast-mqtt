<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动快传 · 管理后台登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 400px;
            max-width: 90%;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #1890ff;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: #1890ff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }

        .form-input.error {
            border-color: #ff4d4f;
        }

        .error-message {
            color: #ff4d4f;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .captcha-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .captcha-input {
            flex: 1;
        }

        .captcha-image {
            width: 120px;
            height: 44px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            cursor: pointer;
            object-fit: contain;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }

        .captcha-image img {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }

        .captcha-image:hover {
            border-color: #1890ff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(24,144,255,0.3);
        }

        .login-btn:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast 样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            animation: toastIn 0.3s ease;
        }

        .toast-success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .toast-error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .toast-warning { background: #fffbe6; border: 1px solid #ffe58f; color: #faad14; }
        .toast-info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🎯 活动快传</h1>
            <p>管理后台 · 请登录</p>
        </div>

        <div class="form-group">
            <label class="form-label">用户名 / 学号</label>
            <input type="text" class="form-input" id="username" placeholder="请输入用户名或学号" autocomplete="off">
            <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="password" placeholder="请输入密码">
            <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
            <label class="form-label">验证码</label>
            <div class="captcha-group">
                <input type="text" class="form-input captcha-input" id="captchaCode" placeholder="请输入验证码" maxlength="4" autocomplete="off">
                <div class="captcha-image" id="captchaImage" onclick="refreshCaptcha()" title="点击刷新">
                    加载中...
                </div>
            </div>
            <div class="error-message" id="captchaCodeError"></div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = config.API_BASE;
        let currentCaptchaId = '';

        // Toast 消息提示
        function showToast(message, type = 'info') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 获取验证码
        async function refreshCaptcha() {
            const captchaImage = document.getElementById('captchaImage');
            captchaImage.innerHTML = '加载中...';
            
            try {
                const response = await fetch('/captcha');
                const result = await response.json();
                
                if (result.code === 200) {
                    currentCaptchaId = result.data.captcha_id;
                    captchaImage.innerHTML = `<img src="${result.data.captcha_image}" alt="验证码">`;
                } else {
                    captchaImage.innerHTML = '获取失败';
                }
            } catch (err) {
                console.error('获取验证码失败:', err);
                captchaImage.innerHTML = '获取失败';
            }
        }

        // 显示错误
        function showError(field, message) {
            const input = document.getElementById(field);
            const errorDiv = document.getElementById(field + 'Error');
            if (input) input.classList.add('error');
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = message;
            }
        }

        // 清除错误
        function clearErrors() {
            document.querySelectorAll('.form-input').forEach(input => {
                input.classList.remove('error');
            });
            document.querySelectorAll('.error-message').forEach(div => {
                div.style.display = 'none';
            });
        }

        // 设置加载状态
        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            if (loading) {
                btn.innerHTML = '<span class="loading"></span> 登录中...';
                btn.disabled = true;
            } else {
                btn.innerHTML = '登 录';
                btn.disabled = false;
            }
        }

        // 保存登录状态
        function saveLogin(userInfo, token) {
            localStorage.setItem('token', token);
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            localStorage.setItem('loginTime', Date.now());
        }

        // 处理登录
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaCode = document.getElementById('captchaCode').value.trim();

            clearErrors();

            if (!username) {
                showError('username', '请输入用户名');
                return;
            }

            if (!password) {
                showError('password', '请输入密码');
                return;
            }

            if (password.length < 6) {
                showError('password', '密码长度不能少于6个字符');
                return;
            }

            if (!captchaCode) {
                showError('captchaCode', '请输入验证码');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        identifier: username,
                        password: password,
                        captcha_id: currentCaptchaId,
                        captcha_code: captchaCode
                    })
                });

                const result = await response.json();

                if (result.code === 200) {
                    const { user_info, token } = result.data;

                    // 检查是否有管理权限
                    if (user_info.role !== 'admin' && user_info.role !== 'organizer') {
                        showToast('您的账号没有管理后台权限', 'error');
                        setLoading(false);
                        refreshCaptcha();
                        return;
                    }

                    saveLogin(user_info, token);

                    // 跳转到看板
                    window.location.href = 'dashboard.html';
                } else {
                    // 登录失败，刷新验证码
                    refreshCaptcha();
                    document.getElementById('captchaCode').value = '';

                    let errorMsg = '登录失败';
                    let errorField = 'username';

                    // 区分 Pydantic 参数错误和业务错误
                    if (result.detail) {
                        if (typeof result.detail === 'string') {
                            errorMsg = result.detail;
                        } else if (Array.isArray(result.detail)) {
                            const first = result.detail[0] || {};
                            errorMsg = first.msg || '参数错误';
                            const loc = (first.loc || []).join(' ');
                            if (loc.includes('password')) errorField = 'password';
                            else if (loc.includes('captcha')) errorField = 'captchaCode';
                            
                            if (errorMsg.includes('String should have at least')) {
                                errorMsg = '密码长度不能少于6个字符';
                            } else {
                                errorMsg = '用户名或密码不正确';
                                errorField = 'username';
                            }
                        } else if (typeof result.detail === 'object') {
                            errorMsg = result.detail.msg || JSON.stringify(result.detail);
                        }
                    } else if (result.msg) {
                        errorMsg = result.msg;
                    } else {
                        errorMsg = '用户名或密码不正确';
                    }

                    if (errorMsg.includes('验证码') || errorField === 'captchaCode') {
                        showError('captchaCode', errorMsg);
                    } else if (errorMsg === '密码长度不能少于6个字符') {
                        showError('password', errorMsg);
                    } else {
                        showError('username', errorMsg);
                    }
                }
            } catch (err) {
                console.error('登录请求失败:', err);
                showToast('网络错误，请稍后重试', 'error');
                refreshCaptcha();
            } finally {
                setLoading(false);
            }
        }

        // 检查是否已登录
        function checkLogin() {
            const token = localStorage.getItem('token');
            const loginTime = localStorage.getItem('loginTime');

            if (!token || !loginTime) {
                return false;
            }

            // 检查是否过期（24小时）
            const now = Date.now();
            if (now - parseInt(loginTime) > 24 * 60 * 60 * 1000) {
                localStorage.clear();
                return false;
            }

            return true;
        }

        // 如果已登录，自动跳转
        if (checkLogin()) {
            window.location.href = 'dashboard.html';
        } else {
            // 加载验证码
            refreshCaptcha();
        }

        // 回车登录
        document.getElementById('captchaCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
