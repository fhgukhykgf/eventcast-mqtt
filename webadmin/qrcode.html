<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成签到二维码 - 活动快传</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .qrcode-container { text-align: center; margin: 30px 0; padding: 30px; background: #fafafa; border-radius: 8px; }
        #qrcode { display: inline-block; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .qrcode-info { margin-top: 20px; font-size: 14px; color: #666; }
        .qrcode-tip { color: #ff4d4f; font-size: 14px; margin-top: 10px; }
        .event-info { background: #f0f5ff; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #1890ff; }
        .event-info p { margin: 5px 0; color: #333; }
        .event-info strong { color: #1890ff; }
        .refresh-btn { margin-top: 20px; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #f0f0f0; border-top-color: #1890ff; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { color: #ff4d4f; background: #fff1f0; padding: 10px; border-radius: 4px; margin: 10px 0; }
    </style>
    <script src="js/qrcode.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="logo">🎯 活动快传 · 管理后台</div>
            <div class="user-info">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="handleLogout()">退出登录</button>
            </div>
        </div>
        <div class="nav"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="title">📱 生成签到二维码</div>

            <div class="form-group">
                <select class="form-select" id="eventSelect" onchange="loadEventInfo()">
                    <option value="">请选择活动</option>
                </select>
            </div>

            <div id="eventInfo" class="event-info" style="display: none;"></div>

            <div id="errorMsg" class="error-message" style="display: none;"></div>

            <div class="qrcode-container">
                <div id="qrcode"></div>
                <div class="qrcode-info" id="qrcodeInfo">
                    <p>请选择活动生成二维码</p>
                </div>
            </div>

            <div style="text-align: center;">
                <button class="btn btn-primary" onclick="generateQRCode()" id="generateBtn" disabled>生成二维码</button>
                <button class="btn btn-primary" onclick="refreshQRCode()" id="refreshBtn" style="display: none; margin-left: 10px;">刷新二维码</button>
                <button class="btn btn-primary" onclick="downloadQRCode()" id="downloadBtn" style="display: none; margin-left: 10px;">下载二维码</button>
            </div>

            <div class="qrcode-tip" id="tip">
                * 二维码有效期30分钟，过期请刷新
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script>
        const API_BASE = config.API_BASE;  // 修改为你的服务器IP
        let currentEvent = null;
        let qrInterval = null;
        let currentQRCanvas = null;

        // 加载活动列表
        async function loadEvents() {
            const select = document.getElementById('eventSelect');

            try {
                console.log('📡 加载活动列表...');
                const result = await api.get(`${API_BASE}/events/list`, { limit: 100 });

                console.log('📥 活动列表响应:', result);

                if (result && result.code === 200) {
                    let events = result.data || [];
                    const now = new Date();

                    // 过滤掉已结束的活动（结束时间小于当前时间）
                    const activeEvents = events.filter(event => {
                        const endTimeStr = event.end_time || event.start_time || event.time;
                        if (!endTimeStr || endTimeStr === '时间待定') return true;
                        
                        // 兼容 iOS 日期格式
                        const endTime = new Date(endTimeStr.replace(/-/g, '/'));
                        return endTime >= now;
                    });

                    // 按活动开始时间正排序
                    activeEvents.sort((a, b) => {
                        const timeA = new Date((a.start_time || a.time || '').replace(/-/g, '/')).getTime();
                        const timeB = new Date((b.start_time || b.time || '').replace(/-/g, '/')).getTime();
                        return timeA - timeB;
                    });

                    if (activeEvents.length === 0) {
                        select.innerHTML = '<option value="">暂无进行中的活动</option>';
                        document.getElementById('generateBtn').disabled = true;
                        showError('暂无进行中的活动，请先在活动管理中创建活动');
                    } else {
                        let options = '<option value="">请选择活动</option>';
                        activeEvents.forEach(event => {
                            const startTime = event.start_time || event.time || '时间待定';
                            const endTime = event.end_time || '时间待定';
                            options += `<option value="${event.event_id}">${event.title} (${startTime} 到 ${endTime})</option>`;
                        });
                        select.innerHTML = options;
                    }
                } else {
                    select.innerHTML = '<option value="">加载失败</option>';
                    showError('加载活动列表失败：' + (result?.msg || '未知错误'));
                }
            } catch (err) {
                console.error('❌ 加载活动失败:', err);
                select.innerHTML = '<option value="">网络错误</option>';
                showError('网络错误，请检查后端服务是否运行');
            }
        }

        // 显示错误
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `❌ ${msg}`;
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        // 加载活动信息
        async function loadEventInfo() {
            const eventId = document.getElementById('eventSelect').value;
            hideError();

            if (!eventId) {
                document.getElementById('eventInfo').style.display = 'none';
                document.getElementById('generateBtn').disabled = true;
                return;
            }

            try {
                console.log('📡 加载活动详情:', eventId);
                const result = await api.get(`${API_BASE}/events/detail/${eventId}`);

                console.log('📥 活动详情:', result);

                if (result && result.code === 200) {
                    currentEvent = result.data;

                    document.getElementById('eventInfo').style.display = 'block';
                    document.getElementById('eventInfo').innerHTML = `
                        <p><strong>📌 活动名称：</strong>${currentEvent.title}</p>
                        <p><strong>⏰ 活动时间：</strong>${currentEvent.start_time || currentEvent.time || '时间待定'} - ${currentEvent.end_time || '时间待定'}</p>
                        <p><strong>📍 活动地点：</strong>${currentEvent.location || '待定'}</p>
                        <p><strong>📊 报名/签到：</strong>${currentEvent.apply_count || 0} / ${currentEvent.sign_count || 0} 人</p>
                        <p><strong>📈 签到率：</strong>${currentEvent.sign_rate || '0%'}</p>
                    `;

                    document.getElementById('generateBtn').disabled = false;

                    generateQRCode();
                } else {
                    showError('获取活动详情失败：' + (result?.msg || '未知错误'));
                }

            } catch (err) {
                console.error('❌ 加载活动信息失败:', err);
                showError('网络错误，请稍后重试');
            }
        }

        // 生成二维码
        function generateQRCode() {
            if (!currentEvent) return;

            hideError();

            const qrString = currentEvent.event_id;
            console.log('📊 二维码数据:', qrString);

            document.getElementById('qrcode').innerHTML = '';

            QRCode.toCanvas(document.createElement('canvas'), qrString, {
                width: 300,
                margin: 4,
                color: {
                    dark: '#000000',
                    light: '#ffffff'
                }
            }, function(err, canvas) {
                if (err) {
                    console.error('❌ 二维码生成失败:', err);
                    showError('二维码生成失败');
                    return;
                }

                currentQRCanvas = canvas;
                document.getElementById('qrcode').appendChild(canvas);

                // 显示二维码信息
                const validTime = new Date(validUntil).toLocaleTimeString();
                document.getElementById('qrcodeInfo').innerHTML = `
                    <p>✅ 二维码已生成</p>
                    <p>活动：${currentEvent.title}</p>
                    <p>有效期至：${validTime}</p>
                    <p style="font-size: 12px; color: #999;">扫码后自动跳转到签到页</p>
                `;

                document.getElementById('generateBtn').style.display = 'none';
                document.getElementById('refreshBtn').style.display = 'inline-block';
                document.getElementById('downloadBtn').style.display = 'inline-block';

                // 设置定时刷新提醒
                startRefreshTimer();
            });
        }

        // 刷新二维码
        function refreshQRCode() {
            if (qrInterval) {
                clearTimeout(qrInterval);
            }
            generateQRCode();
        }

        // 下载二维码
        function downloadQRCode() {
            if (!currentQRCanvas) return;

            // 创建下载链接
            const link = document.createElement('a');
            link.download = `${currentEvent.title}_签到码.png`;
            link.href = currentQRCanvas.toDataURL('image/png');
            link.click();
        }

        // 启动刷新定时器（27分钟后提醒）
        function startRefreshTimer() {
            if (qrInterval) {
                clearTimeout(qrInterval);
            }

            qrInterval = setTimeout(() => {
                Toast.warning('二维码即将过期，请及时刷新');
                document.getElementById('refreshBtn').style.backgroundColor = '#ff4d4f';
                document.getElementById('refreshBtn').style.color = 'white';
            }, 27 * 60 * 1000);
        }

        // 测试API连接
        async function testConnection() {
            try {
                const result = await api.get(`${API_BASE}/health`);
                console.log('✅ API连接正常:', result);
                return true;
            } catch (err) {
                console.error('❌ API连接失败:', err);
                showError('无法连接到后端服务，请检查服务器是否运行');
                return false;
            }
        }

        // 初始化
        async function init() {
            if (!api.checkAuth()) return;
            
            showUserName();
            renderNav('qrcode');

            // 先测试连接
            const connected = await testConnection();
            if (connected) {
                loadEvents();
            }
        }

        init();

        // 清理定时器
        window.onbeforeunload = function() {
            if (qrInterval) {
                clearTimeout(qrInterval);
            }
        };
    </script>
</body>
</html>
